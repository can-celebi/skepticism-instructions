<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instructions — left-column prototype</title>
  <link rel="stylesheet" href="./css/left.css?v=55" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- pre-split = single column; .split-open reveals the second column (slides 7–8) -->
  <div id="lx-app">

    <div class="lx-content">
      <!-- single column: text (top) + animated stage (below) + controls -->
      <section id="lx-col-a" class="lx-col">
        <div class="lx-scroll">
          <div class="lx-textblock">
            <div class="lx-head-row">
              <div class="lx-step-label" id="lx-step-label"></div>
              <button id="lx-info-btn" class="lx-info-btn" hidden>ⓘ</button>
            </div>
            <h1 class="lx-title" id="lx-title"></h1>
            <div class="lx-main" id="lx-main"></div>
          </div>

          <div class="lx-stage-wrap" id="lx-stage-wrap">
            <div class="lx-stage" id="lx-stage"></div>
            <div class="lx-controls" id="lx-controls" hidden></div>
            <div class="lx-warn" id="lx-warn" hidden></div>
          </div>

          <!-- OK button + progressively-revealed text live BELOW the animation -->
          <div class="lx-below" id="lx-below">
            <div class="lx-below-text" id="lx-below-text"></div>
            <button id="lx-ok" class="lx-ok" hidden>OK</button>
          </div>
          <div class="lx-nexthint" id="lx-nexthint" hidden></div>
        </div>
      </section>
    </div>

    <!-- info overlay (slide 3) -->
    <div id="lx-info-panel" class="lx-info-panel" hidden>
      <button id="lx-info-close" class="lx-info-close">✕</button>
      <h2 id="lx-info-title" class="lx-info-title"></h2>
      <div id="lx-info-body" class="lx-info-body"></div>
    </div>

    <footer class="lx-footer" id="lx-footer">
      <button class="lx-nav" id="lx-back">Back</button>
      <div class="lx-dots" id="lx-dots"></div>
      <button class="lx-nav next" id="lx-next">Next</button>
    </footer>
  </div>

  <!-- reused pure engines -->
  <script src="./js/config.js"></script>
  <script src="./js/rng.js"></script>
  <script src="./js/stars.js"></script>
  <script src="./js/products.js"></script>
  <script src="./js/typewriter.js"></script>
  <!-- new left-column modules -->
  <script src="./js/left/content.js"></script>
  <script src="./js/left/widgets.js"></script>
  <script src="./js/left/scenes.js"></script>
  <script src="./js/left/stage.js"></script>
  <script src="./js/left/app.js"></script>
</body>
</html>
